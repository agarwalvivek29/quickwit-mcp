name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: pytest -q --cov=quickwit_mcp --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t quickwit-mcp:ci .

  helm-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint charts/quickwit-mcp --set quickwit.baseUrl=http://quickwit:7280
      - name: Render chart (default + ingress/hpa)
        run: |
          helm template qw charts/quickwit-mcp \
            --set quickwit.baseUrl=http://quickwit:7280 >/dev/null
          helm template qw charts/quickwit-mcp \
            --set quickwit.baseUrl=http://quickwit:7280 \
            --set ingress.enabled=true --set autoscaling.enabled=true >/dev/null
