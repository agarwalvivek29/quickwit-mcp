name: CI

# Runs on every PR (the merge gate by convention) and on pushes to main.
# Genesis commit ships before any Python package exists, so CI triggers on
# pull_request only — the first content PR (#1) introduces pyproject.toml and
# turns this green. Issue #13 hardens this into a full matrix.
on:
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
