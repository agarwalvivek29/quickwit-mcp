# Default values for quickwit-mcp.

replicaCount: 2

image:
  repository: ghcr.io/agarwalvivek29/quickwit-mcp
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Stateless streamable-http (recommended for multi-replica). When true, any pod
# can serve any request, so the round-robin Service works without sticky sessions.
# Set false ONLY with replicaCount=1 (or with session affinity configured).
stateless: true

# --- application config (maps to env vars) ---
quickwit:
  # REQUIRED: base URL of the Quickwit instance, e.g. http://quickwit:7280
  baseUrl: ""
  # Optional overrides; left empty -> server defaults apply.
  timeout: ""          # QW_TIMEOUT (seconds)
  defaultMaxHits: ""   # QW_DEFAULT_MAX_HITS
  maxHitsCeiling: ""   # QW_MAX_HITS_CEILING

# Extra environment variables, e.g. [{name: FOO, value: bar}]
extraEnv: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: quickwit-mcp.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Horizontal Pod Autoscaler (autoscaling/v2). When enabled, replicaCount is ignored.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 0   # 0 = disabled

# PodDisruptionBudget. maxUnavailable=1 keeps node drains working even at 1 replica.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
  minAvailable: ""

# Liveness AND readiness both target /health (no Quickwit dependency).
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
